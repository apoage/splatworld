# Precompute pipeline environment (CLAUDE.md: "env pinned in precompute/env.yml").
#
# OUR MACHINES (local 1x 3090 + trader 4x 3090, all Ampere sm_86): the pip index
# below (cu124) is correct as-is for every machine we use.
#   conda env create -f precompute/env.yml && conda activate splat-relight
#
# ONLY IF EVER ON THE SEPARATE BLACKWELL 5090 BOX (sm_120): DO NOT use cu124 — it throws
#   "no kernel image" on sm_120. Instead use the cu128 wheels:
#     pip install torch torchvision --index-url https://download.pytorch.org/whl/cu128
#   and build any CUDA extension (gsplat) with:
#     TORCH_CUDA_ARCH_LIST="12.0" pip install --no-build-isolation gsplat
#   Verify: torch.cuda.get_device_capability() == (12, 0) AND a real matmul runs.
name: splat-relight
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pip
  - pip:
      - --extra-index-url https://download.pytorch.org/whl/cu124
      - torch
      - torchvision
      - numpy
      - plyfile
      - opencv-python-headless
      - imageio
      - imageio-ffmpeg
      - scipy
      - tqdm
      - rich
      - pytest
      - gsplat            # builds CUDA ext on install; fine on sm_86 w/ cu124
# Separate conda env for COLMAP (isolated from the torch env). conda-forge's
# colmap 4.1.0 needed openimageio + libfaiss pulled explicitly:
#   conda create -n colmap --override-channels -c conda-forge colmap openimageio libfaiss
# Godot 4.7 -> binary in ~/godot (from github.com/godotengine/godot releases).
